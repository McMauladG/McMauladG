<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Lie Detector</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 700px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
            font-size: 1em;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .start-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex: 1;
            min-width: 150px;
        }

        .start-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .stop-btn {
            background: #e74c3c;
            color: white;
            flex: 1;
            min-width: 150px;
        }

        .stop-btn:hover:not(:disabled) {
            background: #c0392b;
            box-shadow: 0 5px 20px rgba(231, 76, 60, 0.4);
        }

        .reset-btn {
            background: #95a5a6;
            color: white;
            flex: 1;
            min-width: 150px;
        }

        .reset-btn:hover:not(:disabled) {
            background: #7f8c8d;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status-box {
            background: #ecf0f1;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .status-text {
            color: #2c3e50;
            font-weight: 600;
            font-size: 1.1em;
        }

        .recording-indicator {
            display: none;
            width: 20px;
            height: 20px;
            background: #e74c3c;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        .recording-indicator.active {
            display: inline-block;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .waveform {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            height: 40px;
        }

        .wave-bar {
            background: #667eea;
            border-radius: 2px;
            width: 4px;
            height: 20px;
            animation: wavePulse 0.6s ease-in-out infinite;
        }

        .wave-bar:nth-child(1) { animation-delay: 0s; }
        .wave-bar:nth-child(2) { animation-delay: 0.1s; }
        .wave-bar:nth-child(3) { animation-delay: 0.2s; }
        .wave-bar:nth-child(4) { animation-delay: 0.3s; }
        .wave-bar:nth-child(5) { animation-delay: 0.4s; }

        @keyframes wavePulse {
            0%, 100% { height: 10px; }
            50% { height: 30px; }
        }

        .waveform.inactive .wave-bar {
            animation: none;
            height: 15px;
        }

        .transcript-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .transcript-section.active {
            display: block;
        }

        .transcript-label {
            color: #2c3e50;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .transcript-text {
            background: white;
            padding: 15px;
            border-radius: 8px;
            color: #555;
            line-height: 1.6;
            min-height: 60px;
            border-left: 4px solid #3498db;
        }

        .result-section {
            display: none;
            animation: slideIn 0.5s ease;
        }

        .result-section.active {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .meter {
            margin-bottom: 20px;
        }

        .meter-label {
            color: #2c3e50;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .meter-value {
            font-size: 1.5em;
            font-weight: bold;
        }

        .meter-bar {
            width: 100%;
            height: 30px;
            background: #ecf0f1;
            border-radius: 15px;
            overflow: hidden;
        }

        .meter-fill {
            height: 100%;
            background: linear-gradient(90deg, #2ecc71 0%, #f1c40f 50%, #e74c3c 100%);
            width: 0%;
            transition: width 0.6s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.9em;
        }

        .analysis-results {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .result-item {
            margin-bottom: 15px;
            padding: 12px;
            background: white;
            border-left: 4px solid #3498db;
            border-radius: 5px;
        }

        .result-item.warning {
            border-left-color: #f39c12;
        }

        .result-item.danger {
            border-left-color: #e74c3c;
        }

        .result-item.success {
            border-left-color: #2ecc71;
        }

        .result-item strong {
            color: #2c3e50;
        }

        .result-item p {
            color: #555;
            margin-top: 5px;
            font-size: 0.95em;
        }

        .verdict {
            text-align: center;
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
            font-size: 1.3em;
            font-weight: bold;
        }

        .verdict.truth {
            background: #d4edda;
            color: #155724;
            border: 2px solid #28a745;
        }

        .verdict.lie {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }

        .verdict.uncertain {
            background: #fff3cd;
            color: #856404;
            border: 2px solid #ffeaa7;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message.active {
            display: block;
        }

        .score-breakdown {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 0.9em;
        }

        .score-breakdown div {
            padding: 5px 0;
            color: #555;
        }

        .info-box {
            background: #e3f2fd;
            color: #1565c0;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.9em;
            border-left: 4px solid #1565c0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎙️ Voice Lie Detector</h1>
        <p class="subtitle">Speak naturally and we'll analyze your statement</p>

        <div class="info-box">
            💡 <strong>Tip:</strong> Click "Stop Recording" when you're done speaking. The detector will NOT stop automatically!
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="status-box">
            <div class="recording-indicator" id="recordingIndicator"></div>
            <div class="status-text" id="statusText">Ready to listen</div>
            <div class="waveform inactive" id="waveform">
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
            </div>
        </div>

        <div class="button-group">
            <button class="start-btn" id="startBtn" onclick="startListening()">🎤 Start Recording</button>
            <button class="stop-btn" id="stopBtn" onclick="stopListening()" disabled>⏹️ Stop Recording</button>
            <button class="reset-btn" id="resetBtn" onclick="resetForm()">🔄 Reset</button>
        </div>

        <div class="transcript-section" id="transcriptSection">
            <div class="transcript-label">Transcribed Text:</div>
            <div class="transcript-text" id="transcriptText"></div>
        </div>

        <div class="result-section" id="resultSection">
            <div class="meter">
                <div class="meter-label">
                    <span>Deception Likelihood</span>
                    <span class="meter-value" id="scoreValue">0%</span>
                </div>
                <div class="meter-bar">
                    <div class="meter-fill" id="meterFill"></div>
                </div>
            </div>

            <div class="score-breakdown" id="scoreBreakdown"></div>

            <div class="analysis-results" id="analysisResults"></div>

            <div class="verdict" id="verdict"></div>
        </div>
    </div>

    <script>
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        let isListening = false;
        let finalTranscript = '';
        let silenceTimeout;

        function initSpeechRecognition() {
            if (!SpeechRecognition) {
                showError('Speech Recognition not supported in your browser. Please use Chrome, Edge, or Safari.');
                return false;
            }

            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-US';

            recognition.onstart = function() {
                isListening = true;
                document.getElementById('startBtn').disabled = true;
                document.getElementById('stopBtn').disabled = false;
                document.getElementById('recordingIndicator').classList.add('active');
                document.getElementById('waveform').classList.remove('inactive');
                document.getElementById('statusText').textContent = '🎤 Listening... (speak freely - won\'t auto-stop)';
                finalTranscript = '';
            };

            recognition.onresult = function(event) {
                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        finalTranscript += transcript + ' ';
                    } else {
                        interimTranscript += transcript;
                    }
                }

                const displayText = finalTranscript + interimTranscript;
                document.getElementById('transcriptText').textContent = displayText || 'Listening...';
                document.getElementById('transcriptSection').classList.add('active');

                // Restart the silence timeout
                clearTimeout(silenceTimeout);
            };

            recognition.onerror = function(event) {
                if (event.error === 'no-speech') {
                    // Restart on silence instead of stopping
                    recognition.stop();
                    setTimeout(function() {
                        if (isListening) {
                            recognition.start();
                        }
                    }, 500);
                } else {
                    showError('Error: ' + event.error);
                }
            };

            recognition.onend = function() {
                // Don't do anything automatic - wait for user to click stop
            };

            return true;
        }

        function startListening() {
            if (!recognition) {
                if (!initSpeechRecognition()) return;
            }
            
            clearError();
            finalTranscript = '';
            isListening = true;
            recognition.start();
        }

        function stopListening() {
            isListening = false;
            if (recognition) {
                recognition.stop();
            }
            document.getElementById('stopBtn').disabled = true;
            document.getElementById('startBtn').disabled = false;
            document.getElementById('recordingIndicator').classList.remove('active');
            document.getElementById('waveform').classList.add('inactive');
            document.getElementById('statusText').textContent = '✓ Recording stopped';
            
            if (finalTranscript.trim()) {
                setTimeout(() => {
                    analyzeLie(finalTranscript);
                }, 500);
            }
        }

        function analyzeLie(text) {
            if (!text.trim()) {
                showError('No speech detected. Please try again.');
                return;
            }

            let score = 50;
            const findings = [];
            const breakdown = {};

            const fillers = ['um', 'uh', 'like', 'you know', 'er', 'ah', 'hmm', 'well', 'so', 'basically'];
            let fillerCount = 0;
            fillers.forEach(f => {
                fillerCount += (text.match(new RegExp('\\b' + f + '\\b', 'gi')) || []).length;
            });
            if (fillerCount >= 1) {
                score += fillerCount * 5;
                breakdown.fillers = fillerCount * 5;
                findings.push({
                    type: 'warning',
                    title: `Filler Words (${fillerCount})`,
                    text: `"${fillers.filter(f => text.toLowerCase().includes(f)).join('", "')}" - indicates hesitation`
                });
            }

            const qualifiers = ['I think', 'I believe', 'I guess', 'maybe', 'probably', 'possibly', 'sort of', 'kind of', 'I suppose', 'somewhat'];
            let qualifierCount = 0;
            qualifiers.forEach(q => {
                qualifierCount += (text.match(new RegExp(q, 'gi')) || []).length;
            });
            if (qualifierCount >= 1) {
                score += qualifierCount * 8;
                breakdown.qualifiers = qualifierCount * 8;
                findings.push({
                    type: 'warning',
                    title: `Defensive Qualifiers (${qualifierCount})`,
                    text: 'Softening language suggests uncertainty or lack of confidence'
                });
            }

            const denials = ['I didn\'t', 'I never', 'I wouldn\'t', 'I don\'t', 'didn\'t', 'never', 'no way'];
            let denialCount = 0;
            denials.forEach(d => {
                denialCount += (text.match(new RegExp('\\b' + d + '\\b', 'gi')) || []).length;
            });
            if (denialCount >= 2) {
                score += denialCount * 10;
                breakdown.denials = denialCount * 10;
                findings.push({
                    type: 'danger',
                    title: `Excessive Denials (${denialCount})`,
                    text: 'Repeating denials is a classic deception indicator'
                });
            }

            const corrections = (text.match(/(wait|actually|I mean|no wait|let me|I said|scratch that)/gi) || []).length;
            if (corrections >= 1) {
                score += corrections * 7;
                breakdown.corrections = corrections * 7;
                findings.push({
                    type: 'warning',
                    title: `Self-Corrections (${corrections})`,
                    text: 'Changing story mid-sentence suggests confusion or fabrication'
                });
            }

            const totalWords = text.split(/\s+/).length;
            if (totalWords < 8) {
                score += 15;
                breakdown.shortResponse = 15;
                findings.push({
                    type: 'warning',
                    title: 'Very Short Response',
                    text: 'Brief answers are hard to analyze - usually indicates evasion'
                });
            }

            const firstPersonCount = (text.match(/\bI\b/gi) || []).length;
            if (firstPersonCount > totalWords * 0.3) {
                score -= 15;
                breakdown.pronouns = -15;
                findings.push({
                    type: 'success',
                    title: 'Strong First-Person Usage',
                    text: 'Good use of "I" suggests ownership and honesty'
                });
            } else if (firstPersonCount < totalWords * 0.05) {
                score += 12;
                breakdown.avoidPronoun = 12;
                findings.push({
                    type: 'danger',
                    title: 'Avoiding Personal Pronouns',
                    text: 'Lack of "I" suggests distancing from statement'
                });
            }

            const questions = (text.match(/\?/g) || []).length;
            if (questions >= 2) {
                score += questions * 5;
                breakdown.questions = questions * 5;
                findings.push({
                    type: 'warning',
                    title: `Questions in Statement (${questions})`,
                    text: 'Answering with questions is evasive'
                });
            }

            score = Math.min(100, Math.max(0, score));

            displayResults(score, findings, breakdown);
        }

        function displayResults(score, findings, breakdown) {
            const meterFill = document.getElementById('meterFill');
            const scoreValue = document.getElementById('scoreValue');
            const analysisResults = document.getElementById('analysisResults');
            const verdict = document.getElementById('verdict');
            const scoreBreakdown = document.getElementById('scoreBreakdown');

            meterFill.style.width = score + '%';
            scoreValue.textContent = score + '%';

            let breakdownHTML = '<strong>Score Calculation:</strong><br>';
            let totalShown = 0;
            for (let key in breakdown) {
                const value = breakdown[key];
                breakdownHTML += `<div>+ ${value > 0 ? value : value} points (${key})</div>`;
                totalShown += value;
            }
            breakdownHTML += `<div style="border-top: 1px solid #ddd; margin-top: 8px; padding-top: 8px;"><strong>Total: ${totalShown} + 50 (baseline) = ${Math.min(100, Math.max(0, totalShown + 50))}%</strong></div>`;
            scoreBreakdown.innerHTML = breakdownHTML;

            let resultsHTML = '';
            findings.forEach(finding => {
                resultsHTML += `<div class="result-item ${finding.type}"><strong>${finding.title}</strong><p>${finding.text}</p></div>`;
            });

            analysisResults.innerHTML = resultsHTML || '<p style="color: #7f8c8d;">No suspicious patterns detected</p>';

            let verdictHTML = '';
            let verdictClass = '';

            if (score < 35) {
                verdictHTML = '✅ Likely TRUTHFUL';
                verdictClass = 'truth';
            } else if (score < 65) {
                verdictHTML = '⚠️ UNCERTAIN - Need More Info';
                verdictClass = 'uncertain';
            } else {
                verdictHTML = '🚨 Likely DECEPTIVE';
                verdictClass = 'lie';
            }

            verdict.innerHTML = verdictHTML;
            verdict.className = 'verdict ' + verdictClass;

            document.getElementById('resultSection').classList.add('active');
        }

        function resetForm() {
            finalTranscript = '';
            document.getElementById('transcriptText').textContent = '';
            document.getElementById('transcriptSection').classList.remove('active');
            document.getElementById('resultSection').classList.remove('active');
            document.getElementById('statusText').textContent = 'Ready to listen';
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            clearError();
        }

        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.classList.add('active');
        }

        function clearError() {
            const errorEl = document.getElementById('errorMessage');
            errorEl.classList.remove('active');
        }

        window.addEventListener('load', function() {
            initSpeechRecognition();
        });
    </script>
</body>
</html>
